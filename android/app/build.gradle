plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.rabahdj_local_app"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.rabahdj_local_app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
        
        // تفعيل هذا السطر إلزامي لمكتبات الإشعارات والتشفير الحديثة لتفادي أخطاء الـ AAR
        multiDexEnabled true
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // سحب المكتبة الداعمة الصافية لتوافقية جافا 8
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}
