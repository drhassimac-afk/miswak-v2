plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    // ... الإعدادات الحالية مثل compileSdk ونطاق التطبيق

    compileOptions {
        // تفعيل الخاصية هنا هامة جداً لمكتبة الإشعارات
        isCoreLibraryDesugaringEnabled = true 
        
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }
}


    kotlinOptions {
        jvmTarget = '1.8'
    }

    defaultConfig {
        applicationId "com.example.rabahdj_local_app"
        minSdkVersion 21
        targetSdkVersion 36
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                compileSdkVersion 36
            }
        }
    }
}
dependencies {
    // أضف هذا السطر لتوفير دعم مكتبات جافا الحديثة للهواتف القديمة
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")
}


