plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.rabahdj_local_app"
    compileSdk 34

    compileOptions {
        // تفعيل خاصية الـ Desugaring الإلزامية للإصدار v22 (صيغة Groovy الصافية)
        coreLibraryDesugaringEnabled true
        
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.example.rabahdj_local_app"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    // سحب حزمة فك التشفير والتوافقية المطلوبة للإصدار الجديد (صيغة Groovy)
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.4"
}
