pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(settingsDir, "local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settingsEvaluated { settings ->
        settings.pluginManagement.plugins {
            id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
        }
    }
}

include ':app'

setBinding(new Binding([gradle: this]))
evaluate(new File(
    settingsDir,
    '../.flutter-plugins-dependencies/dependency_lookup.gradle'
))
